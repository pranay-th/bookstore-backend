<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Your login OTP — Enterprise Book Store</title>
</head>
<body style="margin:0;padding:0;background:#f4f4f5;font-family:Arial,sans-serif;">
  <table width="100%" cellpadding="0" cellspacing="0" style="background:#f4f4f5;padding:40px 0;">
    <tr>
      <td align="center">
        <table width="600" cellpadding="0" cellspacing="0" style="background:#ffffff;border-radius:8px;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,0.08);">
          <!-- Header -->
          <tr>
            <td style="background:#1d4ed8;padding:32px 40px;">
              <h1 style="margin:0;color:#ffffff;font-size:24px;font-weight:700;">📚 Enterprise Book Store</h1>
            </td>
          </tr>
          <!-- Body -->
          <tr>
            <td style="padding:40px;text-align:center;">
              <h2 style="margin:0 0 8px;color:#111827;font-size:20px;">Your login OTP</h2>
              <p style="margin:0 0 32px;color:#374151;font-size:15px;">Hi {{ first_name }}, use this code to complete your login.</p>
              <!-- OTP code -->
              <div style="display:inline-block;background:#f0f9ff;border:2px dashed #1d4ed8;border-radius:12px;padding:24px 48px;margin-bottom:24px;">
                <span style="font-size:48px;font-weight:800;letter-spacing:12px;color:#1d4ed8;">{{ otp }}</span>
              </div>
              <p style="margin:0;color:#6b7280;font-size:13px;">
                This code expires in <strong>{{ expiry_minutes }} minutes</strong>.<br>
                Never share this code with anyone.
              </p>
            </td>
          </tr>
          <!-- Footer -->
          <tr>
            <td style="background:#f9fafb;padding:20px 40px;border-top:1px solid #e5e7eb;">
              <p style="margin:0;color:#9ca3af;font-size:12px;text-align:center;">
                If you didn't request this, please ignore this email.<br>
                &copy; {{ year }} Enterprise Book Store.
              </p>
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</body>
</html>
