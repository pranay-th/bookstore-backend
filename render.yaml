services:
  - type: web
    name: bookstore-backend
    env: python
    # collectstatic runs here where DATABASE_URL is available.
    # Migrations run on container start (startCommand) so the schema always
    # matches the deployed code, even if the GitHub Actions migrate job is
    # skipped or races behind a Render auto-deploy.
    buildCommand: "pip install -r requirements.txt && python manage.py collectstatic --no-input"
    startCommand: "python manage.py migrate --no-input && gunicorn config.wsgi:application --bind 0.0.0.0:$PORT --workers 2 --timeout 120"
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: config.settings.production
      - key: SECRET_KEY
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        sync: false
      - key: CORS_ALLOWED_ORIGINS
        sync: false
      # Razorpay — Test Mode (UPI payments). Secrets are entered in the
      # Render dashboard (sync: false), never committed to git.
      - key: RAZORPAY_KEY_ID
        sync: false
      - key: RAZORPAY_KEY_SECRET
        sync: false
      - key: RAZORPAY_CURRENCY
        value: INR
    healthCheckPath: /health/
