name: Backend Deploy

# Only runs on push to main.
# This is the ONLY place that runs migrate against the Neon production database.

on:
  push:
    branches: [main]

jobs:
  migrate:
    name: Migrate Neon DB
    runs-on: ubuntu-latest
    env:
      DJANGO_SETTINGS_MODULE: config.settings.production
      # Secrets must be set in GitHub → Settings → Secrets and variables → Actions
      SECRET_KEY:    ${{ secrets.SECRET_KEY }}
      DATABASE_URL:  ${{ secrets.DATABASE_URL }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run migrations → Neon
        run: python manage.py migrate --no-input

  deploy:
    name: Deploy to Render
    runs-on: ubuntu-latest
    needs: migrate   # Never deploy if migrations fail

    steps:
      - uses: actions/checkout@v4

      # TODO: Replace the echo below with the real Render deploy hook step once
      #       RENDER_DEPLOY_HOOK_URL is added to GitHub secrets.
      - name: Trigger Render deploy
        run: |
          if [ -n "${{ secrets.RENDER_DEPLOY_HOOK_URL }}" ]; then
            curl -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}"
          else
            echo "RENDER_DEPLOY_HOOK_URL not set — skipping deploy trigger"
          fi
