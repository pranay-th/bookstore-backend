name: Backend CI

# Runs on every push / PR to develop or main.
# Does NOT touch Neon — uses a throwaway Postgres service container for tests.
# Migrations against Neon only happen in deploy.yml on push to main.

on:
  push:
    branches: [main, develop, 'feature/**', 'bugfix/**', 'hotfix/**']
  pull_request:
    branches: [main, develop]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: pip install -r requirements.txt flake8

      - name: Run flake8
        run: flake8 apps/ config/ --max-line-length=120 --exclude=migrations

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: lint

    # Throwaway Postgres — completely separate from Neon production DB
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB:       bookstore_test
          POSTGRES_USER:     bookstore_test
          POSTGRES_PASSWORD: bookstore_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    env:
      DJANGO_SETTINGS_MODULE: config.settings.development
      SECRET_KEY: ci-test-secret-not-used-in-production
      # Points at the throwaway container — never Neon
      DATABASE_URL: postgresql://bookstore_test:bookstore_test@localhost:5432/bookstore_test

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run migrations (throwaway DB only)
        run: python manage.py migrate --no-input

      - name: Run tests
        run: python manage.py test apps/ --verbosity=2
